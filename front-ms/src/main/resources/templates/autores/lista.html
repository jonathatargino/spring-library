<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="pt-BR">
<head th:replace="~{fragments/layout :: head('Autores')}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3">Autores</h1>
        <a th:href="@{/autores/novo}" class="btn btn-primary" sec:authorize="hasRole('BIBLIOTECARIO')">+ Novo Autor</a>
    </div>

    <div th:if="${mensagem}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${mensagem}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div th:if="${erro}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${erro}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div th:if="${autores.empty}" class="text-muted">Nenhum autor cadastrado.</div>

    <table th:unless="${autores.empty}" class="table table-striped table-hover">
        <thead class="table-dark">
            <tr>
                <th>#</th>
                <th>Nome</th>
                <th>Nacionalidade</th>
                <th>Ano de Nascimento</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="autor : ${autores}">
                <td th:text="${autor.id}"></td>
                <td th:text="${autor.nome}"></td>
                <td th:text="${autor.nacionalidade}"></td>
                <td th:text="${autor.anoNascimento}"></td>
                <td sec:authorize="hasRole('BIBLIOTECARIO')">
                    <a th:href="@{/autores/{id}/editar(id=${autor.id})}"
                       class="btn btn-sm btn-outline-secondary me-1">Editar</a>
                    <form th:action="@{/autores/{id}/excluir(id=${autor.id})}"
                          method="post" class="d-inline">
                        <button type="submit" class="btn btn-sm btn-outline-danger"
                                th:data-nome="${autor.nome}"
                                onclick="return confirm('Confirmar exclusão de ' + this.dataset.nome + '?')">
                            Excluir
                        </button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script th:replace="~{fragments/layout :: scripts}"></script>
</body>
</html>
