<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head th:replace="~{fragments/layout :: head('Detalhe do Livro')}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container mt-4" style="max-width: 700px;">
    <div class="d-flex align-items-center gap-2 mb-4">
        <a th:href="@{/livros}" class="btn btn-sm btn-outline-secondary">&larr; Voltar para a lista</a>
        <h1 class="h3 mb-0" th:text="${livro.titulo}">Título</h1>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <dl class="row mb-0">
                <dt class="col-sm-4">Título</dt>
                <dd class="col-sm-8" th:text="${livro.titulo}"></dd>

                <dt class="col-sm-4">Gênero</dt>
                <dd class="col-sm-8" th:text="${livro.genero}"></dd>

                <dt class="col-sm-4">Ano de Publicação</dt>
                <dd class="col-sm-8" th:text="${livro.anoPublicacao}"></dd>

                <dt class="col-sm-4">Disponível</dt>
                <dd class="col-sm-8">
                    <span th:if="${livro.disponivel}" class="badge bg-success fs-6">Sim</span>
                    <span th:unless="${livro.disponivel}" class="badge bg-secondary fs-6">Não</span>
                </dd>

                <dt class="col-sm-4">Autor</dt>
                <dd class="col-sm-8" th:text="${livro.nomeAutor}"></dd>
            </dl>
        </div>
        <div class="card-footer d-flex gap-2">
            <a th:href="@{/livros/{id}/editar(id=${livro.id})}" class="btn btn-outline-secondary">
                Editar
            </a>
            <form th:action="@{/livros/{id}/excluir(id=${livro.id})}" method="post" class="d-inline">
                <button type="submit" class="btn btn-outline-danger"
                        th:data-titulo="${livro.titulo}"
                        onclick="return confirm('Confirmar exclusão do livro: ' + this.dataset.titulo + '?')">
                    Excluir
                </button>
            </form>
            <a th:href="@{/livros}" class="btn btn-outline-secondary ms-auto">Voltar para a lista</a>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script th:replace="~{fragments/layout :: scripts}"></script>
</body>
</html>
