spring.application.name=front-ms
server.port=8080

livro.ms.url=${LIVRO_MS_URL:http://localhost:8081}
autor.ms.url=${AUTOR_MS_URL:http://localhost:8082}

spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8

jwt.secret=${JWT_SECRET:troque-este-segredo-compartilhado-em-producao-0123456789}
jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:30}

app.usuarios.bibliotecario.usuario=${BIBLIOTECARIO_USER:bibliotecario}
app.usuarios.bibliotecario.senha=${BIBLIOTECARIO_PASS:biblioteca123}
app.usuarios.usuario.usuario=${USUARIO_USER:usuario}
app.usuarios.usuario.senha=${USUARIO_PASS:usuario123}
