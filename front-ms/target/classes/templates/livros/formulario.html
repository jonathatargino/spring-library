<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head th:replace="~{fragments/layout :: head('Livro')}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container mt-4" style="max-width: 600px;">
    <div class="d-flex align-items-center gap-2 mb-3">
        <a th:href="@{/livros}" class="btn btn-sm btn-outline-secondary">&larr; Voltar</a>
        <h1 class="h3 mb-0">
            <span th:if="${livro.id == null}">Novo Livro</span>
            <span th:unless="${livro.id == null}">Editar Livro</span>
        </h1>
    </div>

    <div th:if="${erro}" class="alert alert-danger" th:text="${erro}"></div>
    <div th:if="${avisoAutores}" class="alert alert-warning" th:text="${avisoAutores}"></div>

    <form th:action="${livro.id == null} ? @{/livros} : @{/livros/{id}(id=${livro.id})}"
          th:object="${livro}" method="post" novalidate>

        <div class="mb-3">
            <label for="titulo" class="form-label">Título <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="titulo" th:field="*{titulo}"
                   th:classappend="${#fields.hasErrors('titulo')} ? 'is-invalid'" />
            <div class="invalid-feedback" th:errors="*{titulo}"></div>
        </div>

        <div class="mb-3">
            <label for="genero" class="form-label">Gênero <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="genero" th:field="*{genero}"
                   th:classappend="${#fields.hasErrors('genero')} ? 'is-invalid'" />
            <div class="invalid-feedback" th:errors="*{genero}"></div>
        </div>

        <div class="mb-3">
            <label for="anoPublicacao" class="form-label">Ano de Publicação <span class="text-danger">*</span></label>
            <input type="number" class="form-control" id="anoPublicacao" th:field="*{anoPublicacao}"
                   th:classappend="${#fields.hasErrors('anoPublicacao')} ? 'is-invalid'" />
            <div class="invalid-feedback" th:errors="*{anoPublicacao}"></div>
        </div>

        <div class="mb-3">
            <label for="autorId" class="form-label">Autor <span class="text-danger">*</span></label>
            <select class="form-select" id="autorId" th:field="*{autorId}"
                    th:classappend="${#fields.hasErrors('autorId')} ? 'is-invalid'"
                    th:disabled="${autores.empty}">
                <option value="">-- Selecione um autor --</option>
                <option th:each="autor : ${autores}"
                        th:value="${autor.id}"
                        th:text="${autor.nome}"></option>
            </select>
            <div class="invalid-feedback" th:errors="*{autorId}"></div>
        </div>

        <div class="mb-3 form-check">
            <!-- Hidden field ensures false is sent when checkbox is unchecked -->
            <input type="hidden" name="_disponivel" value="on" />
            <input type="checkbox" class="form-check-input" id="disponivel"
                   th:field="*{disponivel}" />
            <label class="form-check-label" for="disponivel">Disponível</label>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary"
                    th:disabled="${autores.empty}">
                <span th:if="${livro.id == null}">Salvar</span>
                <span th:unless="${livro.id == null}">Atualizar</span>
            </button>
            <a th:href="@{/livros}" class="btn btn-outline-secondary">Cancelar</a>
        </div>
    </form>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script th:replace="~{fragments/layout :: scripts}"></script>
</body>
</html>
