<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head th:replace="~{fragments/layout :: head('Erro')}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container mt-5 text-center">
    <div class="py-5">
        <div class="display-1 text-muted mb-3">⚠️</div>
        <h1 class="h3 mb-2">Algo deu errado</h1>
        <p class="text-muted mb-4"
           th:text="${mensagemErro} ?: 'Um serviço está temporariamente indisponível.'"></p>
        <div class="d-flex gap-2 justify-content-center">
            <a th:href="@{/livros}" class="btn btn-primary">Ir para Livros</a>
            <a th:href="@{/autores}" class="btn btn-outline-secondary">Ir para Autores</a>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script th:replace="~{fragments/layout :: scripts}"></script>
</body>
</html>
